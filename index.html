const WEB_APP_URL="https://script.google.com/macros/s/AKfycbygo73HP2KmbxLwMQmPAD4RYvCDphQmWgKTO3w8agJEEleoNm-LY2GamKhlsADqzVaF/exec"; const today=new Date(); document.getElementById('inspectDate').value=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
const itemNames=['1. 설비주위에 물건, 전선 정리는 되어 있는가?','2. 작업대는 정리가 되어 있는가?','3. 작업지도서 등 현장부착물 잘 되어 있는가?','4. 작업대는 작업하기 편하게 정돈 되어 있는가?','5. 설비 점검 및 주변청소는 잘 되어 있는가?','6. 바닥에 기름이나 물은 청소 되었는가?','7. 오일 누수 및 파손 될 결함은 없는가?','8. 각종 유류는 눈으로 보는 관리가 되고 있는가?','9. 작업자의 작업복 및 안전복장은 갖추었는가?','10. 게시물은 잘 관리되고 있는가?'];
function defaultSettings(){return {machines:Array.from({length:20},(_,i)=>{let n=String(i+1).padStart(2,'0');let makers=['AIDA','SIMPAC','SEYI','KOMATSU','HYUNDAI'];let tons=['80T','110T','150T','200T','300T'];let teams=['제조1팀','제조2팀','제조3팀'];let owners=['홍길동','김철수','이민수','박지훈','최영호','정다은','오세훈','강민재','한지훈','윤서준'];return {active:true,machine:'PRESS-'+n,maker:makers[i%5],ton:tons[i%5],team:teams[i%3],owner:owners[i%10]}})}}
async function loadMachines(){
  let settings=null;
  try{
    // Apps Script에서 설비 마스터 제공 시 우선 사용합니다. 미지원 시 아래 localStorage/기본값으로 자동 대체됩니다.
    const res=await fetch(WEB_APP_URL+'?action=get_settings&ts='+Date.now());
    const json=await res.json();
    if(json&&json.status==='success'&&json.settings&&Array.isArray(json.settings.machines)) settings=json.settings;
  }catch(e){}
  if(!settings){
    settings=JSON.parse(localStorage.getItem('mymachine_v3_settings')||'null')||defaultSettings();
  }
  let machines=(settings.machines||[]).filter(m=>m.active!==false);
  let opts=machines.map(m=>`<option value="${m.machine}">${m.machine} / ${m.maker||'-'} / ${m.ton||'-'} / ${m.team||'-'} / ${m.owner||'-'}</option>`).join('');
  document.getElementById('machineId').innerHTML='<option value="">설비 선택</option>'+opts;
}
function renderItems(){
  let html='';
  itemNames.forEach((t,i)=>{
    if(i%2===0)html+=`<div class="cat">${['정리','정돈','청소','청결','습관화'][i/2]}</div>`;
    html+=`<div class="item" id="checkItem${i+1}">
      <div class="item-head">${t}</div>
      <div class="radio">
        <label class="ok"><input type="radio" name="item${i+1}" value="O" onchange="updateChoiceStyle(${i+1})"><span>✅ 우수(O)</span></label>
        <label class="ng"><input type="radio" name="item${i+1}" value="X" onchange="updateChoiceStyle(${i+1})"><span>⚠ 미흡(X)</span></label>
      </div>
      <div class="select-status" id="status${i+1}">미선택</div>
    </div>`
  });
  document.getElementById('items').innerHTML=html;
}
function updateChoiceStyle(num){
  const card=document.getElementById('checkItem'+num);
  const labels=card.querySelectorAll('.radio label');
  labels.forEach(l=>l.classList.remove('selected-ok','selected-ng'));
  card.classList.remove('selected-ok','selected-ng');
  const checked=document.querySelector('input[name=item'+num+']:checked');
  const status=document.getElementById('status'+num);
  if(!checked){status.textContent='미선택';return;}
  if(checked.value==='O'){
    checked.closest('label').classList.add('selected-ok');
    card.classList.add('selected-ok');
    status.textContent='선택 완료: 우수(O)';
  }else{
    checked.closest('label').classList.add('selected-ng');
    card.classList.add('selected-ng');
    status.textContent='선택 완료: 미흡(X)';
  }
}
function preview(input,id){let img=document.getElementById(id); if(input.files[0]){let r=new FileReader();r.onload=e=>{img.src=e.target.result;img.style.display='block'};r.readAsDataURL(input.files[0]);}}
function getBase64(file){return new Promise((res,rej)=>{let r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file)})}
async function compressBase64(file,max=1280,q=.72){return new Promise(resolve=>{let img=new Image(),r=new FileReader();r.onload=e=>img.src=e.target.result;img.onload=()=>{let c=document.createElement('canvas');let scale=Math.min(1,max/Math.max(img.width,img.height));c.width=img.width*scale;c.height=img.height*scale;c.getContext('2d').drawImage(img,0,0,c.width,c.height);resolve(c.toDataURL('image/jpeg',q).split(',')[1]);};r.readAsDataURL(file);})}
async function submitData(){let data={inspectDate:inspectDate.value,inspectorName:inspectorName.value.trim(),machineId:machineId.value,issueRemarks:issueRemarks.value,photos:[]}; if(!data.inspectDate||!data.inspectorName||!data.machineId)return alert('일자, 점검자, 담당 설비를 입력하세요.'); for(let i=1;i<=10;i++){let r=document.querySelector('input[name=item'+i+']:checked'); if(!r)return alert(i+'번 항목을 선택하세요.'); data['item'+i]=r.value;} let before=document.getElementById('beforePhoto').files[0];
  let after=document.getElementById('afterPhoto').files[0];
  if(!before||!after){
    if(!confirm('개선 전/후 사진 중 등록되지 않은 사진이 있습니다. 그래도 제출하시겠습니까?')) return;
  }
  const xCount=Array.from({length:10},(_,i)=>document.querySelector('input[name=item'+(i+1)+']:checked').value).filter(v=>v==='X').length;
  if(!confirm('점검 결과를 등록하시겠습니까?\n\n담당 설비: '+data.machineId+'\n점검자: '+data.inspectorName+'\n미흡 항목: '+xCount+'건')) return;
  for(let id of ['beforePhoto','afterPhoto']){let f=document.getElementById(id).files[0]; if(f)data.photos.push({mimeType:'image/jpeg',base64:await compressBase64(f)})} let btn=document.querySelector('button');btn.disabled=true;btn.textContent='전송 중...'; try{let res=await fetch(WEB_APP_URL,{method:'POST',body:JSON.stringify(data),headers:{'Content-Type':'text/plain;charset=utf-8'}});let result=await res.json(); if(result.status==='success'){alert('등록 완료');location.reload()}else alert('오류: '+result.message)}catch(e){alert('통신 오류')}finally{btn.disabled=false;btn.textContent='점검 결과 등록'}}
loadMachines();renderItems();
</script></body></html>
